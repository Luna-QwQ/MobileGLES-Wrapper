name: Build MobileGLES for iOS
on: [push, workflow_dispatch]
jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Build MobileGLES
        run: |
          cd MobileGlues-cpp
          wget https://github.com/leetal/ios-cmake/raw/master/ios.toolchain.cmake
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=ios.toolchain.cmake \
            -DSTATICLIB=OFF \
            -DMACOS=ON \
            -DPLATFORM=OS64 \
            -DCMAKE_C_FLAGS=-Wno-error=implicit-function-declaration
          cmake --build build --config RelWithDebInfo --target mobilegles
          codesign -s - build/libmobilegles.dylib

      - name: Upload lib
        uses: actions/upload-artifact@v4
        with:
          name: MobileGLES-iOS-dylib
          path: /Users/runner/work/MobileGLES/MobileGLES/MobileGlues-cpp/build
