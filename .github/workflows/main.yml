name: Cleanup Old Workflow Runs
on:
  workflow_dispatch:       # 也支持手动触发

permissions:
  actions: write
  contents: read

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete old runs
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          retain_days: 30        # 保留最近 30 天
          keep_minimum_runs: 6    # 每个 workflow 至少留 6 条
          # dry_run: true         # 先开这个看看会删啥，确认后再关掉
