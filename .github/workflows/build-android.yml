name: Build MobileGlues for Android arm64-v8a
on: [push, workflow_dispatch]
jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 27.3.13750724
      ANDROID_NDK_HOME: /usr/local/lib/android/sdk/ndk/27.3.13750724
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          submodules: recursive

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup CMake
        uses: lukka/get-cmake@latest
        with:
          cmakeVersion: "3.29.6"

      - name: Install Android NDK
        run: |
          yes | sudo ${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager --install \
            "ndk;${{ env.NDK_VERSION }}" > /dev/null

      - name: Build MobileGlues
        run: |
          cd MobileGlues-cpp
          cmake -B build \
            -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_HOME }}/build/cmake/android.toolchain.cmake \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_static \
            -DSTATICLIB=OFF \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_FLAGS="-Wno-error=implicit-function-declaration"
          cmake --build build --config Release --target mobileglues

      - name: Strip shared library
        run: |
          STRIP="${{ env.ANDROID_NDK_HOME }}/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip"
          LIB_PATH="MobileGlues-cpp/build/libmobileglues.so"
          echo "Before strip: $(stat -c%s ${LIB_PATH}) bytes"
          ${STRIP} --strip-all ${LIB_PATH}
          echo "After strip: $(stat -c%s ${LIB_PATH}) bytes"

      - name: Upload lib
        uses: actions/upload-artifact@v4
        with:
          name: MobileGlues-Android-arm64-v8a
          path: MobileGlues-cpp/build/libmobileglues.so
