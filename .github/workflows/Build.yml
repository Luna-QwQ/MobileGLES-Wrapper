name: Build

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-22.04
    env:
      BUILD_DIR: "android-build"
      ANDROID_ABI: "arm64-v8a"
      ANDROID_PLATFORM: "android-24"
      NDK_VERSION: "25.2.9519653"  # 使用广泛兼容的NDK版本

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # 关键修复：使用Java 11而不是Java 17
    - name: Setup Java 11 (for Android compatibility)
      uses: actions/setup-java@v3
      with:
        java-version: '11'  # Android工具需要Java 8-11
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v2

    # 修复许可证接受问题
    - name: Accept Android Licenses
      run: |
        # 安装兼容性包
        sudo apt-get update
        sudo apt-get install -y libxml2-utils
        
        # 确保sdkmanager可用
        mkdir -p $ANDROID_HOME/licenses
        echo "8933bad161af4178b1185d1a37fbf41ea5269c55" > $ANDROID_HOME/licenses/android-sdk-license
        echo "d56f5187479451eabf01fb78af6dfcb131a6481e" >> $ANDROID_HOME/licenses/android-sdk-license
        echo "24333f8a63b6825ea9c5514f83c2829b004d1fee" >> $ANDROID_HOME/licenses/android-sdk-license
        
        # 安装基本工具
        $ANDROID_HOME/tools/bin/sdkmanager "platform-tools"

    - name: Install Android NDK
      run: |
        $ANDROID_HOME/tools/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
        echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

    - name: Verify NDK installation
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
        ls -la $ANDROID_NDK_HOME

    - name: Install CMake and Ninja
      run: |
        sudo apt-get update
        sudo apt-get install -y cmake ninja-build

    - name: Create build directory
      run: mkdir -p ${{ env.BUILD_DIR }}

    - name: Configure with CMake
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_SYSTEM_VERSION=${{ env.ANDROID_PLATFORM }} \
          -DCMAKE_ANDROID_ARCH_ABI=${{ env.ANDROID_ABI }} \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
          -DCMAKE_ANDROID_STL_TYPE=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_ABI=${{ env.ANDROID_ABI }} \
          -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }} \
          -G Ninja

    - name: Build the project
      working-directory: ${{ env.BUILD_DIR }}
      run: cmake --build . --target mobileglues --parallel $(nproc)

    - name: Verify build output
      run: |
        find ${{ env.BUILD_DIR }} -name "*.so" -exec ls -lh {} \;
        if [ -f "${{ env.BUILD_DIR }}/libmobileglues.so" ]; then
          echo "✅ Build successful!"
        else
          echo "❌ Build failed - libmobileglues.so not found!"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-arm64-libmobileglues
        path: ${{ env.BUILD_DIR }}/libmobileglues.so
        retention-days: 7
        if-no-files-found: error
