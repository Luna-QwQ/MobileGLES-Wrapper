name: Build

on:
  workflow_dispatch:  # 允许手动触发

jobs:
  build-android:
    runs-on: ubuntu-latest
    env:
      BUILD_DIR: "android-build"
      ANDROID_ABI: "arm64-v8a"
      ANDROID_PLATFORM: "android-24"
      NDK_VERSION: "25.2.9519653"  # 使用稳定版本的NDK

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android-sdk@v2.0.6
      with:
        sdkmanager: true  # 确保安装sdkmanager

    - name: Install Android NDK
      run: |
        # 接受所有许可
        yes | $ANDROID_HOME/tools/bin/sdkmanager --licenses
        # 安装指定版本的NDK
        $ANDROID_HOME/tools/bin/sdkmanager "ndk;${{ env.NDK_VERSION }}"
        # 设置环境变量
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV
        echo "NDK_HOME=$ANDROID_HOME/ndk/${{ env.NDK_VERSION }}" >> $GITHUB_ENV

    - name: Verify NDK installation
      run: |
        echo "ANDROID_HOME: $ANDROID_HOME"
        echo "ANDROID_NDK_HOME: $ANDROID_NDK_HOME"
        ls -la $ANDROID_NDK_HOME

    - name: Create build directory
      run: |
        mkdir -p ${{ env.BUILD_DIR }}
        cd ${{ env.BUILD_DIR }}
        echo "Build directory created"

    - name: Configure CMake
      working-directory: ${{ env.BUILD_DIR }}
      run: |
        cmake $GITHUB_WORKSPACE \
          -DCMAKE_SYSTEM_NAME=Android \
          -DCMAKE_ANDROID_ARCH_ABI=${{ env.ANDROID_ABI }} \
          -DCMAKE_ANDROID_NDK=$ANDROID_NDK_HOME \
          -DCMAKE_ANDROID_STL_TYPE=c++_shared \
          -DCMAKE_BUILD_TYPE=Release \
          -DANDROID_PLATFORM=${{ env.ANDROID_PLATFORM }}

    - name: Build project
      working-directory: ${{ env.BUILD_DIR }}
      run: cmake --build . --target mobileglues -- -j$(nproc)

    - name: Verify build output
      run: |
        ls -la ${{ env.BUILD_DIR }}/
        if [ -f "${{ env.BUILD_DIR }}/libmobileglues.so" ]; then
          echo "Build successful!"
        else
          echo "Build failed - libmobileglues.so not found!"
          exit 1
        fi

    - name: Upload artifact
      uses: actions/upload-artifact@v4  # 使用v4版本解决弃用问题
      with:
        name: android-libmobileglues
        path: ${{ env.BUILD_DIR }}/libmobileglues.so
        if-no-files-found: error
