name: Clean only artifacts

on:
  workflow_dispatch:

jobs:
  cleanup-artifacts:
    runs-on: ubuntu-latest
    permissions:
      actions: write   # 删除 artifacts 必需
      contents: read

    steps:
      - name: Delete all artifacts (except current run's)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          CURRENT_RUN_ID: ${{ github.run_id }}
        run: |
          echo "Current run ID: $CURRENT_RUN_ID (artifacts will be kept)"

          # 获取所有 artifact，排除当前 run 的
          ARTIFACT_IDS=$(gh api repos/$REPO/actions/artifacts \
            --paginate \
            --jq ".artifacts[] | select(.workflow_run.id != $CURRENT_RUN_ID) | .id")

          if [ -z "$ARTIFACT_IDS" ]; then
            echo "No old artifacts to delete."
            exit 0
          fi

          # 逐个删除
          for ARTIFACT_ID in $ARTIFACT_IDS; do
            echo "Deleting artifact ID: $ARTIFACT_ID"
            gh api repos/$REPO/actions/artifacts/$ARTIFACT_ID -X DELETE
          done

          echo "Artifact cleanup completed."
